<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register - SpaceAI</title>

<style>
body {
    background: #0d0d0d;
    font-family: Arial;
    color: white;
}

.box {
    width: 320px;
    margin: 120px auto;
    padding: 25px;
    background: #111;
    border-radius: 10px;
    text-align: center;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    background: #222;
    border: none;
    color: white;
    border-radius: 5px;
}

button {
    width: 100%;
    padding: 10px;
    background: #00aaff;
    border: none;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

a {
    color: #00aaff;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="box">
    <h2>Create SpaceAI Account</h2>

    <input id="regUser" placeholder="Username">
    <input id="regPass" type="password" placeholder="Password">

    <button onclick="register()">Register</button>

    <p>Already have an account? <a href="login.html">Login</a></p>
</div>

<script src="api.js"></script>
<script>
async function register() {
    const user = document.getElementById("regUser").value.trim();
    const pass = document.getElementById("regPass").value.trim();

    if (!user || !pass) {
        alert("Please fill in all fields");
        return;
    }

    if (user.length < 3) {
        alert("Username must be at least 3 characters");
        return;
    }

    if (pass.length < 6) {
        alert("Password must be at least 6 characters");
        return;
    }

    // Disable button during request
    const btn = event.target;
    btn.disabled = true;
    btn.textContent = "Registering...";

    try {
        const response = await SpaceAIAPI.register(user, pass);
        
        if (response.success) {
            // Store username for display
            localStorage.setItem("spaceai_user", response.username || user);
            localStorage.setItem("spaceai_logged_in", "true");
            
            alert("Account created successfully!");
            window.location.href = "index.html";
        } else {
            alert(response.message || "Registration failed");
        }
    } catch (error) {
        alert(error.message || "Registration failed. Please try again.");
    } finally {
        btn.disabled = false;
        btn.textContent = "Register";
    }
}

// Allow Enter key to submit
document.getElementById("regPass").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        register();
    }
});
</script>

</body>
</html>
